<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      LOGIN
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Tab 1</ion-title>
    </ion-toolbar>
  </ion-header>

<ion-item>
  <ion-label> {{usuarioEmail}}</ion-label>
</ion-item>

<ion-item class = "fondo_oscuro">
  <ion-label>USUARIO</ion-label>

  <ion-item class = "fondo">
    <ion-input placeholder="Email" [(ngModel)]="email"></ion-input>
  </ion-item>

</ion-item>
<ion-item class = "fondo_oscuro">
  <ion-label>CONTRASEÑA</ion-label>

  <ion-item class = "fondo">
    <ion-input type="password" [(ngModel)]="password"></ion-input>
  </ion-item>

</ion-item>
<ion-item>
  <ion-button expand="full" (click)="login()"> Iniciar sesión</ion-button>
  <ion-button expand="full" (click)="registro()"> Registro</ion-button>
  <ion-button expand="full" (click)="loginGOOGLE()">Login con GOOGLE</ion-button>
  <ion-button expand="full" (click)="logOut()">Logout</ion-button>
</ion-item>

</ion-content>
